<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Hockey Stats"/>
  <title>Hockey Stats</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#e8e8e8;min-height:100vh;padding:16px 12px 40px;}
    select,input,button{font-family:inherit;}
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState, useRef} = React;

// ── Constants ────────────────────────────────────────────────────────────────
const GAME_TYPES = ["Regular Season","Playoff","Championship","Tournament"];
const SKATER_COLS = ["GP","G","A","P","PPG","PIM"];
const GOALIE_COLS = ["GP","W","L","T","OTL","SO","GA","GAA"];
const POSITIONS = ["C","LW","RW","D","G"];

// ── Data helpers ─────────────────────────────────────────────────────────────
function getTeamCfg(data, tid) {
  const seasons = (data.customSeasons&&data.customSeasons[tid]) ? data.customSeasons[tid] : [];
  return { name:data.teams[tid].name, color:data.teams[tid].color, seasons:["All Time",...seasons] };
}

function initData() {
  return {
    teams:{ team1:{ name:"My Team", color:"#223E54" } },
    players:{ team1:[] }, games:{ team1:[] },
    statOverrides:{}, playerPhotos:{}, teamLogos:{}, teamSecondaryLogos:{}, teamFonts:{},
    adminPassword:"admin", gallery:{}, teamOrder:["team1"],
    customSeasons:{ team1:[] }
  };
}

function loadData() {
  try {
    const raw = localStorage.getItem("hockeyStatsApp");
    const d = raw ? JSON.parse(raw) : initData();
    if(!d.teamLogos) d.teamLogos={};
    if(!d.teamSecondaryLogos) d.teamSecondaryLogos={};
    if(!d.playerPhotos) d.playerPhotos={};
    if(!d.teamFonts) d.teamFonts={};
    if(!d.adminPassword) d.adminPassword="admin";
    if(!d.gallery) d.gallery={};
    if(!d.teamOrder) d.teamOrder=Object.keys(d.teams);
    if(!d.customSeasons) d.customSeasons={};
    d.teamOrder = d.teamOrder.filter(tid=>d.teams[tid]);
    Object.keys(d.teams).forEach(tid=>{
      if(!d.players[tid]) d.players[tid]=[];
      if(!d.games[tid]) d.games[tid]=[];
      if(!d.customSeasons[tid]) d.customSeasons[tid]=[];
      const cfg = getTeamCfg(d,tid);
      (d.players[tid]||[]).forEach(p=>{
        if(!p.activeSeasons) p.activeSeasons=[...cfg.seasons.filter(s=>s!=="All Time")];
      });
    });
    localStorage.setItem("hockeyStatsApp",JSON.stringify(d));
    return d;
  } catch(e) { return initData(); }
}

function saveData(d) {
  try { localStorage.setItem("hockeyStatsApp",JSON.stringify(d)); } catch(e){}
}

function computeStats(player, games, overrides, season, teamSeasons) {
  const isG = player.position==="G";
  if (season==="All Time") {
    const all = [...new Set(teamSeasons)].filter(s=>s!=="All Time");
    if (isG) {
      let t={GP:0,W:0,L:0,T:0,OTL:0,SO:0,GA:0};
      all.forEach(sv=>{const st=computeStats(player,games,overrides,sv,teamSeasons);if(st.GP>0){t.GP+=st.GP;t.W+=st.W;t.L+=st.L;t.T+=st.T;t.OTL+=st.OTL;t.SO+=st.SO;t.GA+=st.GA;}});
      t.GAA=t.GP>0?(t.GA/t.GP).toFixed(2):"0.00"; return t;
    } else {
      let t={GP:0,G:0,A:0,PIM:0};
      all.forEach(sv=>{const st=computeStats(player,games,overrides,sv,teamSeasons);if(st.GP>0){t.GP+=st.GP;t.G+=st.G;t.A+=st.A;t.PIM+=st.PIM;}});
      t.P=t.G+t.A; t.PPG=t.GP>0?(t.P/t.GP).toFixed(2):"0.00"; return t;
    }
  }
  const fg=games.filter(g=>g.season===season);
  const ov=overrides[player.id+"_"+season]||{};
  if (isG) {
    let b={GP:0,W:0,L:0,T:0,OTL:0,SO:0,GA:0};
    fg.forEach(g=>{const s=g.goalieStats?.[player.id];if(s){b.GP++;b.W+=s.W||0;b.L+=s.L||0;b.T+=s.T||0;b.OTL+=s.OTL||0;b.SO+=s.SO||0;b.GA+=s.GA||0;}});
    if(Object.keys(ov).length>0)["GP","W","L","T","OTL","SO","GA"].forEach(k=>{if(ov[k]!==undefined)b[k]=ov[k];});
    b.GAA=b.GP>0?(b.GA/b.GP).toFixed(2):"0.00"; return b;
  } else {
    let b={GP:0,G:0,A:0,PIM:0};
    fg.forEach(g=>{const s=g.skaterStats?.[player.id];if(s){b.GP++;b.G+=s.G||0;b.A+=s.A||0;b.PIM+=s.PIM||0;}});
    if(Object.keys(ov).length>0)["GP","G","A","PIM"].forEach(k=>{if(ov[k]!==undefined)b[k]=ov[k];});
    b.P=b.G+b.A; b.PPG=b.GP>0?(b.P/b.GP).toFixed(2):"0.00"; return b;
  }
}

function getRecord(games, season) {
  const f = season==="All Time"?games:games.filter(g=>g.season===season);
  let W=0,L=0,T=0,OTL=0;
  f.forEach(g=>{const r=(g.result||"").toUpperCase();if(r==="W")W++;else if(r==="L")L++;else if(r==="T")T++;else if(r==="OTL")OTL++;});
  return {W,L,T,OTL,GP:f.length};
}

function formatGameTime(date, time) {
  if(!date) return "";
  const days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const d = new Date(date+"T12:00:00");
  return days[d.getDay()]+", "+months[d.getMonth()]+" "+d.getDate()+(time?" at "+time:"");
}

// ── BoxScore ──────────────────────────────────────────────────────────────────
function BoxScore({game, players, tc}) {
  const skaters=(players||[]).filter(p=>p.position!=="G");
  const goalies=(players||[]).filter(p=>p.position==="G");
  const th={padding:"6px",fontSize:11,fontWeight:600,color:"#fff",textAlign:"center",whiteSpace:"nowrap"};
  const td={padding:"6px",fontSize:12,textAlign:"center",color:"#222",borderBottom:"0.5px solid #eee"};
  const tdL={...td,textAlign:"left",paddingLeft:8};
  const sorted=[...skaters].sort((a,b)=>{
    const sa=game.skaterStats?.[a.id]||{},sb=game.skaterStats?.[b.id]||{};
    return ((sb.G||0)+(sb.A||0))-((sa.G||0)+(sa.A||0));
  });
  return (
    <div style={{marginTop:12,paddingTop:12,borderTop:"0.5px solid #e0e0e0"}}>
      {skaters.length>0&&(
        <div style={{marginBottom:goalies.length>0?12:0}}>
          <div style={{fontSize:11,fontWeight:600,color:"#999",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:6}}>Skaters</div>
          <div style={{borderRadius:8,overflow:"hidden",border:"0.5px solid #ddd"}}>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead><tr style={{background:tc}}>
                <th style={{...th,textAlign:"left",paddingLeft:8}}>Player</th>
                {["G","A","P","PIM"].map(c=><th key={c} style={th}>{c}</th>)}
              </tr></thead>
              <tbody>{sorted.map((p,i)=>{
                const st=game.skaterStats?.[p.id]||{};
                const g=st.G||0,a=st.A||0,pts=g+a;
                return(
                  <tr key={p.id} style={{background:i%2===0?"#fafafa":"#fff"}}>
                    <td style={{...tdL,fontWeight:pts>0?600:400}}>{p.name}<span style={{fontSize:10,color:"#aaa",marginLeft:4}}>{"#"+p.number}</span></td>
                    <td style={{...td,fontWeight:g>0?600:400,color:g>0?tc:"#222"}}>{g}</td>
                    <td style={{...td,fontWeight:a>0?600:400,color:a>0?tc:"#222"}}>{a}</td>
                    <td style={{...td,fontWeight:pts>0?600:400,color:pts>0?tc:"#222"}}>{pts}</td>
                    <td style={td}>{st.PIM||0}</td>
                  </tr>
                );
              })}</tbody>
            </table>
          </div>
        </div>
      )}
      {goalies.length>0&&(
        <div>
          <div style={{fontSize:11,fontWeight:600,color:"#999",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:6}}>Goalies</div>
          <div style={{borderRadius:8,overflow:"hidden",border:"0.5px solid #ddd"}}>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead><tr style={{background:tc}}>
                <th style={{...th,textAlign:"left",paddingLeft:8}}>Player</th>
                {["W","L","GA","SO"].map(c=><th key={c} style={th}>{c}</th>)}
              </tr></thead>
              <tbody>{goalies.map((p,i)=>{
                const st=game.goalieStats?.[p.id]||{};
                return(
                  <tr key={p.id} style={{background:i%2===0?"#fafafa":"#fff"}}>
                    <td style={tdL}>{p.name}<span style={{fontSize:10,color:"#aaa",marginLeft:4}}>{"#"+p.number}</span></td>
                    <td style={{...td,fontWeight:(st.W||0)>0?600:400,color:(st.W||0)>0?tc:"#222"}}>{st.W||0}</td>
                    <td style={{...td,fontWeight:(st.L||0)>0?600:400,color:(st.L||0)>0?"#c41a1a":"#222"}}>{st.L||0}</td>
                    <td style={td}>{st.GA||0}</td>
                    <td style={td}>{st.SO||0}</td>
                  </tr>
                );
              })}</tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Cards ─────────────────────────────────────────────────────────────────────
function UpNextCard({game, tc, secondaryLogo, onEnterResult}) {
  return (
    <div style={{position:"relative",borderRadius:12,overflow:"hidden",marginBottom:16,border:"2px solid "+tc+"44",background:"#fff"}}>
      {secondaryLogo&&<img src={secondaryLogo} alt="" style={{position:"absolute",right:-8,top:"50%",transform:"translateY(-50%)",width:150,height:150,objectFit:"contain",opacity:0.18,pointerEvents:"none"}}/>}
      <div style={{position:"absolute",inset:0,background:"linear-gradient(105deg,"+tc+"22 0%,"+tc+"08 55%,transparent 100%)",pointerEvents:"none"}}/>
      <div style={{position:"absolute",left:0,top:0,bottom:0,width:4,background:tc,borderRadius:"12px 0 0 12px"}}/>
      <div style={{position:"relative",padding:"14px 16px 14px 18px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
          <span style={{fontSize:11,fontWeight:600,color:tc,background:tc+"18",borderRadius:20,padding:"2px 10px",letterSpacing:"0.04em"}}>UP NEXT</span>
          {game.gameType&&game.gameType!=="Regular Season"&&<span style={{fontSize:11,color:"#777",background:"#f0f0f0",borderRadius:20,padding:"2px 8px"}}>{game.gameType}</span>}
        </div>
        <div style={{fontWeight:700,fontSize:18,color:"#111",marginBottom:2}}>vs {game.opponent}</div>
        <div style={{fontSize:12,color:tc,fontWeight:500,marginBottom:3}}>{game.season}</div>
        <div style={{fontSize:13,color:"#555",marginBottom:2}}>{formatGameTime(game.date,game.time)}</div>
        {game.location&&<div style={{fontSize:13,color:"#777",marginBottom:10}}>📍 {game.location}</div>}
        {!game.location&&<div style={{marginBottom:10}}/>}
        <button onClick={onEnterResult} style={{background:tc,color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",cursor:"pointer",fontSize:13,fontWeight:600}}>Enter Result</button>
      </div>
    </div>
  );
}

function ArticleCard({game, tc, secondaryLogo, players}) {
  const [expanded,setExpanded]=useState(false);
  const [boxOpen,setBoxOpen]=useState(false);
  const resColor=game.result==="W"?"#1a7a3c":game.result==="L"?"#c41a1a":game.result==="OTL"?"#b06000":"#777";
  const resBg=game.result==="W"?"#e8f5ee":game.result==="L"?"#fdecea":game.result==="OTL"?"#fff3e0":"#f5f5f5";
  return (
    <div style={{position:"relative",borderRadius:12,overflow:"hidden",marginBottom:14,border:"0.5px solid #ddd",background:"#fff"}}>
      {/* Secondary logo is absolutely positioned and stays fixed even as content expands */}
      {secondaryLogo&&<img src={secondaryLogo} alt="" style={{position:"absolute",right:-8,top:20,width:160,height:160,objectFit:"contain",opacity:0.18,pointerEvents:"none"}}/>}
      <div style={{position:"absolute",inset:0,background:"linear-gradient(105deg,"+tc+"22 0%,"+tc+"08 55%,transparent 100%)",pointerEvents:"none"}}/>
      <div style={{position:"absolute",left:0,top:0,bottom:0,width:4,background:tc,borderRadius:"12px 0 0 12px"}}/>
      <div style={{position:"relative",padding:"14px 16px 12px 18px"}}>
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8,flexWrap:"wrap"}}>
          {game.result&&<span style={{fontSize:12,fontWeight:700,color:resColor,background:resBg,borderRadius:5,padding:"2px 8px"}}>{game.result}{game.score?" - "+game.score:""}</span>}
          {game.gameType&&game.gameType!=="Regular Season"&&<span style={{fontSize:11,color:tc,background:tc+"18",borderRadius:5,padding:"2px 8px",fontWeight:500}}>{game.gameType}</span>}
        </div>
        <div style={{fontWeight:700,fontSize:17,lineHeight:1.25,marginBottom:4,color:"#111"}}>{game.article?game.article.headline:"vs "+game.opponent}</div>
        <div style={{fontSize:12,color:"#777",fontWeight:500,marginBottom:1}}>{game.season}</div>
        <div style={{fontSize:12,color:"#999",marginBottom:game.location?1:6}}>{formatGameTime(game.date,game.time)}</div>
        {game.location&&<div style={{fontSize:12,color:"#999",marginBottom:6}}>📍 {game.location}</div>}
        {game.article&&<>
          <div style={{fontSize:13,color:"#333",lineHeight:1.65,marginTop:4}}>{expanded?game.article.body:game.article.body.slice(0,130)+(game.article.body.length>130?"...":"")}</div>
          {game.article.body.length>130&&<button onClick={()=>setExpanded(e=>!e)} style={{background:"none",border:"none",color:tc,fontSize:12,cursor:"pointer",padding:"4px 0 0",fontWeight:600,display:"block"}}>{expanded?"Show less":"Read more"}</button>}
        </>}
        {!game.article&&<div style={{fontSize:12,color:"#aaa",marginTop:4,fontStyle:"italic"}}>No recap available</div>}
        {players&&players.length>0&&(
          <div style={{marginTop:10}}>
            <button onClick={()=>setBoxOpen(b=>!b)} style={{background:"none",border:"0.5px solid "+tc+"66",borderRadius:6,color:tc,fontSize:12,cursor:"pointer",padding:"4px 10px",fontWeight:600}}>{boxOpen?"Hide Box Score ↑":"Box Score ↓"}</button>
          </div>
        )}
      </div>
      {boxOpen&&players&&players.length>0&&<div style={{padding:"0 16px 14px 18px"}}><BoxScore game={game} players={players} tc={tc}/></div>}
    </div>
  );
}

function ScheduleResultCard({game, tc, players, onDelete}) {
  const [boxOpen,setBoxOpen]=useState(false);
  const [confirmDel,setConfirmDel]=useState(false);
  const resColor=game.result==="W"?"#1a7a3c":game.result==="L"?"#c41a1a":game.result==="OTL"?"#b06000":"#777";
  const resBg=game.result==="W"?"#e8f5ee":game.result==="L"?"#fdecea":game.result==="OTL"?"#fff3e0":"#f5f5f5";
  return (
    <div style={{background:"#fff",border:"0.5px solid #ddd",borderRadius:10,padding:"12px 16px",marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div style={{flex:1}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:2}}>
            <span style={{fontWeight:600,fontSize:15}}>vs {game.opponent}</span>
            {game.result&&<span style={{fontSize:13,fontWeight:600,color:resColor,background:resBg,borderRadius:6,padding:"2px 8px"}}>{game.result}{game.score?" - "+game.score:""}</span>}
            {game.gameType&&game.gameType!=="Regular Season"&&<span style={{fontSize:12,color:tc,background:tc+"18",borderRadius:6,padding:"2px 8px",fontWeight:500}}>{game.gameType}</span>}
          </div>
          <div style={{fontSize:13,color:"#777"}}>{formatGameTime(game.date,game.time)}</div>
          {game.location&&<div style={{fontSize:12,color:"#aaa"}}>📍 {game.location}</div>}
          {players&&players.length>0&&(
            <button onClick={()=>setBoxOpen(b=>!b)} style={{background:"none",border:"0.5px solid "+tc+"66",borderRadius:6,color:tc,fontSize:12,cursor:"pointer",padding:"4px 10px",fontWeight:600,marginTop:6}}>{boxOpen?"Hide Box Score ↑":"Box Score ↓"}</button>
          )}
        </div>
        <div style={{flexShrink:0,marginLeft:8}}>
          {!confirmDel
            ?<button onClick={()=>setConfirmDel(true)} style={{background:"none",border:"none",color:"#bbb",cursor:"pointer",fontSize:20,lineHeight:1,padding:"0 4px"}}>×</button>
            :<div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
              <span style={{fontSize:11,color:"#c41a1a"}}>Delete?</span>
              <div style={{display:"flex",gap:4}}>
                <button onClick={onDelete} style={{background:"#c41a1a",color:"#fff",border:"none",borderRadius:5,padding:"3px 8px",cursor:"pointer",fontSize:11}}>Yes</button>
                <button onClick={()=>setConfirmDel(false)} style={{background:"#f0f0f0",border:"none",borderRadius:5,padding:"3px 8px",cursor:"pointer",fontSize:11}}>No</button>
              </div>
            </div>
          }
        </div>
      </div>
      {boxOpen&&<BoxScore game={game} players={players} tc={tc}/>}
    </div>
  );
}

function UpcomingGameCard({game, tc, s, onEnterResult, onDelete}) {
  const [confirmDel,setConfirmDel]=useState(false);
  return (
    <div style={{...s.card,marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div style={{flex:1}}>
          <div style={{fontWeight:600,fontSize:15,marginBottom:2}}>vs {game.opponent}</div>
          <div style={{fontSize:13,color:"#555",marginBottom:1}}>{formatGameTime(game.date,game.time)}</div>
          {game.location&&<div style={{fontSize:13,color:"#777",marginBottom:6}}>📍 {game.location}</div>}
          {game.gameType&&game.gameType!=="Regular Season"&&<span style={{fontSize:11,color:tc,background:tc+"18",borderRadius:5,padding:"2px 8px",fontWeight:500}}>{game.gameType}</span>}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end",marginLeft:8}}>
          <button onClick={onEnterResult} style={{background:tc,color:"#fff",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:12,fontWeight:500,whiteSpace:"nowrap"}}>Enter Result</button>
          {!confirmDel
            ?<button onClick={()=>setConfirmDel(true)} style={{background:"none",border:"none",color:"#bbb",cursor:"pointer",fontSize:12,padding:0}}>Remove</button>
            :<div style={{display:"flex",gap:4,alignItems:"center"}}>
              <span style={{fontSize:11,color:"#c41a1a"}}>Sure?</span>
              <button onClick={onDelete} style={{background:"#c41a1a",color:"#fff",border:"none",borderRadius:5,padding:"3px 8px",cursor:"pointer",fontSize:11}}>Yes</button>
              <button onClick={()=>setConfirmDel(false)} style={{background:"#f0f0f0",border:"none",borderRadius:5,padding:"3px 8px",cursor:"pointer",fontSize:11}}>No</button>
            </div>
          }
        </div>
      </div>
    </div>
  );
}

function CaptainBadge({role}) {
  if(!role) return null;
  return <span style={{fontSize:11,fontWeight:700,color:"#fff",background: role==="C"?"#b8860b":"#666",borderRadius:4,padding:"1px 5px",marginLeft:5,letterSpacing:"0.03em"}}>{role}</span>;
}
function GalleryPage({gallery, activeTeam, season, seasons, tc, s, onAdd, onOpenLightbox}) {
  const fileRef=useRef();
  const allSeasons=seasons.filter(sv=>sv!=="All Time");
  const uploadSeason=season==="All Time"?(allSeasons[0]||""):season;
  const teamGallery=(gallery&&gallery[activeTeam])||{};
  let photos=[];
  if(season==="All Time"){
    allSeasons.forEach(sv=>(teamGallery[sv]||[]).forEach(p=>photos.push({...p,seasonKey:sv,seasonLabel:sv})));
    photos.sort((a,b)=>new Date(b.uploadedAt)-new Date(a.uploadedAt));
  } else {
    (teamGallery[season]||[]).forEach(p=>photos.push({...p,seasonKey:season,seasonLabel:null}));
    photos.sort((a,b)=>new Date(b.uploadedAt)-new Date(a.uploadedAt));
  }
  function handleFiles(e){
    if(!uploadSeason){alert("Please add a season first.");return;}
    Array.from(e.target.files).forEach(f=>{const r=new FileReader();r.onload=ev=>onAdd(uploadSeason,ev.target.result);r.readAsDataURL(f);});
    e.target.value="";
  }
  return (
    <div>
      <div style={{background:"#fff",border:"2px dashed "+tc+"55",borderRadius:12,padding:16,marginBottom:16,textAlign:"center"}}>
        <div style={{fontSize:13,color:"#777",marginBottom:10}}>
          {season==="All Time"?"Uploading to: ":"Season: "}
          <span style={{fontWeight:600,color:tc}}>{season==="All Time"?"All Time Gallery":uploadSeason}</span>
        </div>
        <input ref={fileRef} type="file" accept="image/*" multiple style={{display:"none"}} onChange={handleFiles}/>
        <button onClick={()=>fileRef.current.click()} style={{...s.btn,fontSize:14,padding:"10px 22px"}}>Upload Photos</button>
        <div style={{fontSize:11,color:"#bbb",marginTop:8}}>JPG, PNG - Multiple allowed</div>
      </div>
      {photos.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:"#aaa",fontSize:14}}>No photos yet.<br/>Be the first to upload one!</div>}
      {photos.length>0&&(
        <div style={{columns:"2 140px",columnGap:8}}>
          {photos.map(photo=>(
            <div key={photo.id} onClick={()=>onOpenLightbox(photo)} style={{breakInside:"avoid",marginBottom:8,position:"relative",borderRadius:10,overflow:"hidden",cursor:"pointer",border:"0.5px solid #ddd"}}>
              <img src={photo.url} alt="" style={{width:"100%",display:"block"}}/>
              {photo.seasonLabel&&<div style={{position:"absolute",top:6,left:6,background:"rgba(0,0,0,0.6)",color:"#fff",fontSize:10,fontWeight:600,padding:"2px 7px",borderRadius:20,maxWidth:"calc(100% - 12px)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{photo.seasonLabel}</div>}

function GameLog({games, isG, player, tc, s, allPlayers}) {
  const [expanded,setExpanded]=useState(false);
  const [openBox,setOpenBox]=useState(null);
  const allReversed=[...games].reverse();
  const displayed=expanded?allReversed:allReversed.slice(0,5);
  return (
    <div style={{...s.card,marginBottom:14,padding:0,overflow:"hidden"}}>
      <div style={{background:tc,padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontWeight:500,fontSize:15,color:"#fff"}}>Game Log</span>
        <span style={{fontSize:13,color:"rgba(255,255,255,0.8)"}}>{games.length+" game"+(games.length!==1?"s":"")}</span>
      </div>
      {games.length===0
        ?<div style={{padding:"14px 16px",color:"#777",fontSize:14}}>No games recorded yet.</div>
        :<>
          {displayed.map(g=>{
            const gs=isG?g.goalieStats?.[player.id]:g.skaterStats?.[player.id];
            const resColor=g.result==="W"?"#1a7a3c":g.result==="L"?"#c41a1a":"#777";
            const isOpen=openBox===g.id;
            return (
              <div key={g.id} style={{borderBottom:"0.5px solid #ddd"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 16px",fontSize:14}}>
                  <div>
                    <span style={{color:"#777",fontSize:12}}>{g.date}</span>
                    <span style={{marginLeft:8,fontWeight:500}}>{"vs "+g.opponent}</span>
                    {g.result&&<span style={{marginLeft:8,fontWeight:600,color:resColor}}>{g.result+(g.score?" "+g.score:"")}</span>}
                    {g.gameType&&g.gameType!=="Regular Season"&&<span style={{marginLeft:6,fontSize:11,color:tc}}>{g.gameType}</span>}
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{color:"#777",fontSize:13}}>{gs?(isG?("W:"+(gs.W||0)+" L:"+(gs.L||0)+" GA:"+(gs.GA||0)):("G:"+(gs.G||0)+" A:"+(gs.A||0)+" P:"+((gs.G||0)+(gs.A||0)))):"—"}</span>
                    {allPlayers&&allPlayers.length>0&&<button onClick={()=>setOpenBox(isOpen?null:g.id)} style={{background:"none",border:"0.5px solid "+tc+"66",borderRadius:5,color:tc,fontSize:11,cursor:"pointer",padding:"2px 7px",fontWeight:600,whiteSpace:"nowrap"}}>{isOpen?"↑":"↓"}</button>}
                  </div>
                </div>
                {isOpen&&<div style={{padding:"0 12px 12px"}}><BoxScore game={g} players={allPlayers} tc={tc}/></div>}
              </div>
            );
          })}
          {games.length>5&&<button onClick={()=>setExpanded(e=>!e)} style={{width:"100%",padding:"10px",background:"#f5f5f5",border:"none",borderTop:"0.5px solid #ddd",cursor:"pointer",fontSize:13,color:tc,fontWeight:500}}>{expanded?"Show less":("Show all "+games.length+" games")}</button>}
        </>
      }
    </div>
  );
}

function PasswordCard({onSavePassword, s}) {
  const [newPw,setNewPw]=useState(""); const [confirm,setConfirm]=useState("");
  const [error,setError]=useState(""); const [saved,setSaved]=useState(false);
  function handleSave(){
    if(!newPw){setError("Password cannot be empty.");return;}
    if(newPw!==confirm){setError("Passwords do not match.");return;}
    onSavePassword(newPw);setNewPw("");setConfirm("");setError("");setSaved(true);setTimeout(()=>setSaved(false),2000);
  }
  return (
    <div style={{background:"#fff",border:"0.5px solid #ddd",borderRadius:10,padding:"12px 16px",marginBottom:10}}>
      <div style={{fontWeight:600,fontSize:15,marginBottom:14}}>Admin Password</div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        <div><div style={{fontSize:13,color:"#777",marginBottom:6}}>New Password</div><input type="password" style={s.input} placeholder="Enter new password" value={newPw} onChange={e=>setNewPw(e.target.value)}/></div>
        <div><div style={{fontSize:13,color:"#777",marginBottom:6}}>Confirm Password</div><input type="password" style={s.input} placeholder="Re-enter new password" value={confirm} onChange={e=>setConfirm(e.target.value)}/></div>
        {error&&<div style={{fontSize:13,color:"#c41a1a"}}>{error}</div>}
        <button onClick={handleSave} style={{...s.btn,background:saved?"#1a7a3c":"#f5f5f5",border:"0.5px solid #ddd",color:saved?"#fff":"#222"}}>{saved?"Password Updated":"Update Password"}</button>
      </div>
    </div>
  );
}

          {hint&&<div style={{fontSize:11,color:"#aaa",marginTop:5}}>{hint}</div>}

        <input ref={ref} type="file" accept="image/*,.svg" style={{display:"none"}} onChange={handleFile}/>

}

function SeasonCard({tid, team, seasons, players, onAddSeason, onDeleteSeason, s}) {
  const [expanded,setExpanded]=useState(false);

                <button onClick={()=>setConfirmDelete(null)} style={{background:"#f0f0f0",border:"none",borderRadius:5,padding:"3px 8px",cursor:"pointer",fontSize:11}}>No</button>
              </div>

      {expanded&&<div>
        <div style={{fontSize:13,fontWeight:500,color:"#777",marginBottom:6}}>Season Name</div>
        <input style={{...s.input,marginBottom:error?6:12}} placeholder="e.g. Summer 2026" value={name} onChange={e=>{setName(e.target.value);setError("");}}/>
        {error&&<div style={{fontSize:12,color:"#c41a1a",marginBottom:10}}>{error}</div>}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div style={{fontSize:13,fontWeight:500,color:"#777"}}>Carry over players</div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>toggleAll(true)} style={{...s.sec,fontSize:12,padding:"4px 10px"}}>All</button>
            <button onClick={()=>toggleAll(false)} style={{...s.sec,fontSize:12,padding:"4px 10px"}}>None</button>
          </div>
        </div>
        {(players||[]).length===0&&<div style={{fontSize:13,color:"#aaa",marginBottom:12}}>No players on roster yet.</div>}
        <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:14}}>
          {(players||[]).map(p=>{
            const on=!!checked[p.id];
            return (
              <button key={p.id} onClick={()=>setChecked(prev=>({...prev,[p.id]:!prev[p.id]}))}
                style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",borderRadius:8,border:on?"2px solid "+team.color:"0.5px solid #ccc",background:on?team.color+"11":"#fff",cursor:"pointer",textAlign:"left"}}>
                <div style={{width:18,height:18,borderRadius:4,border:"2px solid "+(on?team.color:"#ccc"),background:on?team.color:"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                  {on&&<svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                </div>
                <span style={{fontSize:13,color:on?team.color:"#222",fontWeight:on?500:400}}>{p.name}</span>
                <span style={{fontSize:12,color:"#aaa",marginLeft:"auto"}}>{"#"+p.number+" · "+p.position}</span>
              </button>
            );
          })}
        </div>
        <div style={{display:"flex",gap:8}}>
          <button style={s.sec} onClick={()=>setExpanded(false)}>Cancel</button>

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [data,setData]=useState(loadData);
  const getInitialTeam=()=>(data.teamOrder||Object.keys(data.teams)).filter(tid=>data.teams[tid])[0]||"team1";
  const [activeTeam,setActiveTeam]=useState(getInitialTeam);
  const [season,setSeason]=useState(()=>{const cfg=getTeamCfg(data,getInitialTeam());return cfg.seasons[1]||"All Time";});
  const [page,setPage]=useState("home");
  const [selectedPlayer,setSelectedPlayer]=useState(null);
  const [sortCol,setSortCol]=useState("P");
  const [sortDir,setSortDir]=useState(-1);
  const [modal,setModal]=useState(null);
  const [isAdmin,setIsAdmin]=useState(false);
  const [lightbox,setLightbox]=useState(null);

  function save(d){setData(d);saveData(d);}
  function cloneData(){return JSON.parse(JSON.stringify(data));}

  const teamCfg=getTeamCfg(data,activeTeam);
  const team=data.teams[activeTeam];
  const players=data.players[activeTeam]||[];
  const games=data.games[activeTeam]||[];
  const tc=team.color;
  const seasons=teamCfg.seasons;
  const teamLogos=data.teamLogos||{};
  const teamSecondaryLogos=data.teamSecondaryLogos||{};
  const teamFonts=data.teamFonts||{};
  const fontStyle=teamFonts[activeTeam]?("'TeamFont_"+activeTeam+"', sans-serif"):"inherit";
  const activePlayers=(season==="All Time"?players:players.filter(p=>(p.activeSeasons||[]).includes(season))).slice().sort((a,b)=>parseInt(a.number||0)-parseInt(b.number||0));
  const skaters=activePlayers.filter(p=>p.position!=="G");
  const goalies=activePlayers.filter(p=>p.position==="G");
  const teamOrder=(data.teamOrder||Object.keys(data.teams)).filter(tid=>data.teams[tid]);
  function requireAdmin(fn){if(isAdmin){fn();return;}setModal({type:"adminLogin",onSuccess:fn});}

  const statsCache={};
  const getStats=p=>{if(!statsCache[p.id])statsCache[p.id]=computeStats(p,games,data.statOverrides,season,seasons);return statsCache[p.id];};
  const sortSkaters=arr=>[...arr].sort((a,b)=>(parseFloat(getStats(b)[sortCol])||0)-(parseFloat(getStats(a)[sortCol])||0));
  const sortGoalies=arr=>[...arr].sort((a,b)=>(parseFloat(getStats(b)["W"])||0)-(parseFloat(getStats(a)["W"])||0));

  const filteredGames=season==="All Time"?games:games.filter(g=>g.season===season);
  // Upcoming: soonest first. Completed: most recent date first
  const upcomingGames=[...filteredGames].filter(g=>!g.result).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const completedGames=[...filteredGames].filter(g=>!!g.result).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const nextGame=upcomingGames[0]||null;

  const s={
    btn:{background:tc,color:"#fff",border:"none",borderRadius:8,padding:"8px 14px",cursor:"pointer",fontSize:14,fontWeight:500},
    sec:{background:"#f5f5f5",color:"#222",border:"0.5px solid #ccc",borderRadius:8,padding:"8px 14px",cursor:"pointer",fontSize:14},
    input:{width:"100%",padding:"8px 10px",border:"0.5px solid #ccc",borderRadius:8,background:"#fff",color:"#222",fontSize:14,boxSizing:"border-box"},
    th:(col,active)=>({padding:"8px 6px",textAlign:"center",fontSize:12,fontWeight:500,color:active?tc:"#777",cursor:"pointer",whiteSpace:"nowrap",userSelect:"none",borderBottom:active?"2px solid "+tc:"2px solid transparent"}),
    td:{padding:"8px 6px",textAlign:"center",fontSize:13,color:"#222"},
    card:{background:"#fff",border:"0.5px solid #ddd",borderRadius:10,padding:"12px 16px",marginBottom:10}
  };

  function switchTeam(tid){setActiveTeam(tid);setSelectedPlayer(null);setPage("home");const cfg=getTeamCfg(data,tid);setSeason(cfg.seasons[1]||"All Time");setModal(null);setSortCol("P");setSortDir(-1);}
  function handleSeasonChange(val){setSeason(val);setSortCol("P");setSortDir(-1);}

  function savePlayer(p,isEdit){const d=cloneData();if(isEdit)d.players[activeTeam]=d.players[activeTeam].map(x=>x.id===p.id?p:x);else d.players[activeTeam].push({...p,id:"p"+Date.now()});save(d);setModal(null);}
  function deletePlayer(id){const d=cloneData();d.players[activeTeam]=d.players[activeTeam].filter(p=>p.id!==id);save(d);setModal(null);if(selectedPlayer&&selectedPlayer.id===id){setSelectedPlayer(null);setPage("roster");}}
  function saveGame(game){const d=cloneData();d.games[activeTeam].push({...game,id:"g"+Date.now()});save(d);setModal(null);if(game.result)setPage("home");else setPage("schedule");}
  function enterResult(gameId,result){const d=cloneData();d.games[activeTeam]=d.games[activeTeam].map(g=>g.id===gameId?{...g,...result}:g);save(d);setModal(null);setPage("home");}
  function deleteGame(gid){const d=cloneData();d.games[activeTeam]=d.games[activeTeam].filter(g=>g.id!==gid);save(d);}
  function saveStatOverride(player,vals){const d=cloneData();d.statOverrides[player.id+"_"+season]={...vals};save(d);setModal(null);}
  function savePhoto(pid,url){const d=cloneData();d.playerPhotos[pid]=url;save(d);}
  function saveTeamLogo(tid,url){const d=cloneData();d.teamLogos[tid]=url;save(d);}
  function saveTeamSecondaryLogo(tid,url){const d=cloneData();if(!d.teamSecondaryLogos)d.teamSecondaryLogos={};d.teamSecondaryLogos[tid]=url;save(d);}
  function saveTeamFont(tid,url){const d=cloneData();d.teamFonts[tid]=url;save(d);}
  function saveTeamName(tid,nm){const d=cloneData();d.teams[tid].name=nm;save(d);}
  function saveTeamColor(tid,color){const d=cloneData();d.teams[tid].color=color;save(d);}
  function saveAdminPassword(pw){const d=cloneData();d.adminPassword=pw;save(d);}
  function addTeam(){const d=cloneData();const tid="team"+Date.now();d.teams[tid]={name:"New Team",color:"#444444"};d.players[tid]=[];d.games[tid]=[];d.teamOrder=[...(d.teamOrder||[]),tid];if(!d.customSeasons)d.customSeasons={};d.customSeasons[tid]=[];save(d);switchTeam(tid);setPage("settings");}
  function deleteTeam(tid){
    if(teamOrder.length<=1)return;
    const d=cloneData();delete d.teams[tid];delete d.players[tid];delete d.games[tid];
    if(d.teamLogos)delete d.teamLogos[tid];
    if(d.teamSecondaryLogos)delete d.teamSecondaryLogos[tid];
    if(d.teamFonts)delete d.teamFonts[tid];
    if(d.customSeasons)delete d.customSeasons[tid];
    d.teamOrder=(d.teamOrder||[]).filter(id=>id!==tid);save(d);
    const firstTid=d.teamOrder[0]||Object.keys(d.teams)[0];
    const cfg=getTeamCfg(d,firstTid);
    setActiveTeam(firstTid);setSeason(cfg.seasons[1]||"All Time");setPage("home");
  }
  function addGalleryPhoto(seasonKey,url){const d=cloneData();if(!d.gallery[activeTeam])d.gallery[activeTeam]={};if(!d.gallery[activeTeam][seasonKey])d.gallery[activeTeam][seasonKey]=[];d.gallery[activeTeam][seasonKey].push({id:"gi"+Date.now(),url,uploadedAt:new Date().toISOString()});save(d);}
  function deleteGalleryPhoto(seasonKey,photoId){const d=cloneData();if(d.gallery[activeTeam]&&d.gallery[activeTeam][seasonKey])d.gallery[activeTeam][seasonKey]=d.gallery[activeTeam][seasonKey].filter(p=>p.id!==photoId);save(d);setLightbox(null);}
  function moveTeam(tid,dir){const d=cloneData();const order=[...(d.teamOrder||Object.keys(d.teams))];const i=order.indexOf(tid);const ni=i+dir;if(ni<0||ni>=order.length)return;[order[i],order[ni]]=[order[ni],order[i]];d.teamOrder=order;save(d);}
  function addSeason(tid,seasonName,carryoverIds){const d=cloneData();if(!d.customSeasons)d.customSeasons={};if(!d.customSeasons[tid])d.customSeasons[tid]=[];d.customSeasons[tid].unshift(seasonName);(d.players[tid]||[]).forEach(p=>{if(carryoverIds.includes(p.id)){if(!p.activeSeasons)p.activeSeasons=[];if(!p.activeSeasons.includes(seasonName))p.activeSeasons.unshift(seasonName);}});save(d);if(tid===activeTeam)setSeason(seasonName);}
  function deleteSeason(tid,seasonName){const d=cloneData();if(d.customSeasons&&d.customSeasons[tid])d.customSeasons[tid]=d.customSeasons[tid].filter(s=>s!==seasonName);(d.players[tid]||[]).forEach(p=>{if(p.activeSeasons)p.activeSeasons=p.activeSeasons.filter(s=>s!==seasonName);});save(d);if(tid===activeTeam&&season===seasonName){const cfg=getTeamCfg(d,tid);setSeason(cfg.seasons[1]||"All Time");}}

  const record=getRecord(games,season);
  const playerInView=selectedPlayer?players.find(p=>p.id===selectedPlayer.id)||selectedPlayer:null;
  const fontFaceCSS=Object.entries(teamFonts).filter(([,v])=>v).map(([tid,url])=>"@font-face{font-family:'TeamFont_"+tid+"';src:url('"+url+"');}").join(" ");
  const secondaryLogo=teamSecondaryLogos[activeTeam]||null;

  const StatRow=({cols,stats,highlight})=>(
    <div style={{display:"flex",borderRadius:8,overflow:"hidden",border:"1px solid "+tc+"22"}}>
      {cols.map((c,i,arr)=>(
        <div key={c} style={{flex:1,textAlign:"center",padding:"10px 4px",background:i%2===0?"#f5f5f5":"#fff",borderRight:i<arr.length-1?"0.5px solid #ddd":"none"}}>
          <div style={{fontSize:11,color:"#777",marginBottom:4,fontWeight:500}}>{c}</div>
          <div style={{fontSize:20,fontWeight:600,color:highlight.includes(c)?tc:"#222"}}>{stats[c]}</div>
        </div>
      ))}
    </div>
  );

  return (
    <div style={{maxWidth:600,margin:"0 auto",fontFamily:fontStyle,background:"#f0f0f0",borderRadius:14,padding:"16px 14px 40px"}}>
      <style>{fontFaceCSS}</style>

      {/* Team toggle */}
      <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
        {teamOrder.map(tid=>{
          const t=data.teams[tid],active=activeTeam===tid,logo=teamLogos[tid];
          return (
            <button key={tid} onClick={()=>switchTeam(tid)}
              style={{flex:1,minWidth:100,padding:"8px 6px",borderRadius:10,border:"2px solid "+(active?t.color:"#ccc"),background:active?t.color:"#fff",color:active?"#fff":"#222",fontWeight:500,cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
              {logo&&<img src={logo} alt="" style={{width:24,height:24,objectFit:"contain",borderRadius:4,flexShrink:0}}/>}
              <span>{t.name}</span>
            </button>
          );
        })}
      </div>

      {/* Season */}
      <div style={{marginBottom:14}}>
        <select value={season} onChange={e=>handleSeasonChange(e.target.value)} style={s.input}>
          {seasons.map(sv=><option key={sv} value={sv}>{sv}</option>)}
        </select>
      </div>

      {/* Header */}
      <div style={{background:tc,color:"#fff",padding:"12px 16px",borderRadius:"10px 10px 0 0"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,minWidth:0}}>
            {teamLogos[activeTeam]&&<img src={teamLogos[activeTeam]} alt="" style={{width:40,height:40,objectFit:"contain",flexShrink:0}}/>}
            <div style={{minWidth:0}}>
              <div style={{fontSize:17,fontWeight:600,lineHeight:1.2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{team.name}</div>
              {record.GP>0&&season!=="All Time"&&<div style={{fontSize:13,opacity:0.85,marginTop:2}}>{record.W+"-"+record.L+(record.T>0?"-"+record.T:"")+(record.OTL>0?" ("+record.OTL+" OTL)":"")}</div>}
            </div>
          </div>
          <div style={{fontSize:12,opacity:0.75,flexShrink:0,marginLeft:8,textAlign:"right"}}>{season}</div>
        </div>
      </div>

      {/* Nav */}
      <div style={{display:"flex",borderBottom:"2px solid #ddd",marginBottom:16,overflowX:"auto"}}>
        {["home","roster","stats","schedule","gallery","settings"].map(p=>(
          <button key={p} onClick={()=>{
            if(p==="settings"){requireAdmin(()=>{setPage("settings");setSelectedPlayer(null);setModal(null);});return;}
            setPage(p);setSelectedPlayer(null);setModal(null);
          }} style={{flex:1,padding:"10px 2px",background:(page===p&&!selectedPlayer)?tc:"#fff",color:(page===p&&!selectedPlayer)?"#fff":"#777",border:"none",cursor:"pointer",fontWeight:(page===p&&!selectedPlayer)?500:400,fontSize:11,borderBottom:(page===p&&!selectedPlayer)?"2px solid "+tc:"2px solid #ddd",whiteSpace:"nowrap",minWidth:44}}>
            {p.charAt(0).toUpperCase()+p.slice(1)}
          </button>
        ))}
        {selectedPlayer&&<button style={{flex:1,padding:"10px 4px",background:tc,color:"#fff",border:"none",cursor:"pointer",fontWeight:500,fontSize:11,borderBottom:"2px solid "+tc}}>Profile</button>}
      </div>

      {/* Home */}
      {!selectedPlayer&&page==="home"&&(
        <div>
          {nextGame&&<div>
            <div style={{fontWeight:500,fontSize:15,marginBottom:10,color:"#777"}}>Up Next</div>
            <UpNextCard game={nextGame} tc={tc} secondaryLogo={secondaryLogo} onEnterResult={()=>requireAdmin(()=>setModal({type:"enterResult",game:nextGame}))}/>
          </div>}
          <div style={{fontWeight:500,fontSize:15,marginBottom:14,color:"#777"}}>Game Recaps</div>
          {completedGames.length===0&&<div style={{color:"#777",fontSize:14,textAlign:"center",padding:"30px 0"}}>No games yet. Add a game to see recaps here!</div>}
          {completedGames.map(g=><ArticleCard key={g.id} game={g} tc={tc} secondaryLogo={secondaryLogo} players={players}/>)}
        </div>
      )}

      {/* Schedule */}
      {!selectedPlayer&&page==="schedule"&&(
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <span style={{fontWeight:500,fontSize:15}}>Schedule</span>
            <button style={s.btn} onClick={()=>requireAdmin(()=>setModal({type:"addGame"}))}>+ Add Game</button>
          </div>
          {upcomingGames.length>0&&<>
            <div style={{fontWeight:500,fontSize:13,color:"#777",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.05em"}}>Upcoming</div>
            {upcomingGames.map(g=>(
              <UpcomingGameCard key={g.id} game={g} tc={tc} s={s} onEnterResult={()=>requireAdmin(()=>setModal({type:"enterResult",game:g}))} onDelete={()=>requireAdmin(()=>deleteGame(g.id))}/>
            ))}
            <div style={{height:8}}/>
          </>}
          {completedGames.length>0&&<>
            <div style={{fontWeight:500,fontSize:13,color:"#777",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.05em"}}>Results</div>
            {completedGames.map(g=>(
              <ScheduleResultCard key={g.id} game={g} tc={tc} players={players} onDelete={()=>requireAdmin(()=>deleteGame(g.id))}/>
            ))}
          </>}
          {upcomingGames.length===0&&completedGames.length===0&&<div style={{color:"#777",fontSize:14,textAlign:"center",padding:"40px 0"}}>No games yet. Add one to get started!</div>}
        </div>
      )}

      {/* Roster */}
      {!selectedPlayer&&page==="roster"&&(
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <span style={{fontWeight:500,fontSize:15}}>{"Roster ("+activePlayers.length+")"}</span>
            <button style={s.btn} onClick={()=>requireAdmin(()=>setModal({type:"addPlayer"}))}>+ Add Player</button>
          </div>
          {activePlayers.length===0&&<div style={{color:"#777",fontSize:14}}>No players on roster for this season.</div>}
          {activePlayers.map(p=>{
            const photo=data.playerPhotos?.[p.id];
            return (
              <div key={p.id} style={{...s.card,cursor:"pointer"}} onClick={()=>{setSelectedPlayer(p);setModal(null);}}>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  {photo?<img src={photo} style={{width:42,height:42,borderRadius:"50%",objectFit:"cover",border:"2px solid "+tc}}/>:<div style={{width:42,height:42,borderRadius:"50%",background:tc+"22",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,color:tc,fontSize:14}}>{"#"+p.number}</div>}
                  <div><div style={{fontWeight:500,fontSize:15,display:"flex",alignItems:"center"}}>{p.name}<CaptainBadge role={p.captainRole}/></div><div style={{fontSize:13,color:"#777"}}>{p.position+" - #"+p.number}</div></div>
                  <span style={{marginLeft:"auto",color:"#bbb",fontSize:18}}>›</span>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Stats */}
      {!selectedPlayer&&page==="stats"&&(
        <div>
          {skaters.length>0&&<div style={{marginBottom:24}}>
            <div style={{fontWeight:500,fontSize:15,marginBottom:8,color:"#777"}}>Skaters</div>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",minWidth:340}}>
                <thead><tr style={{background:"#f5f5f5"}}>
                  <th style={{...s.th("",false),textAlign:"left",paddingLeft:10}}>Player</th>
                  {SKATER_COLS.map(c=><th key={c} style={s.th(c,sortCol===c)} onClick={()=>{setSortCol(c);setSortDir(sortCol===c?-sortDir:-1);}}>{c}{sortCol===c?(sortDir<0?"↓":"↑"):""}</th>)}
                </tr></thead>
                <tbody>{sortSkaters(skaters).map(p=>{const st=getStats(p);return(
                  <tr key={p.id} onClick={()=>{setSelectedPlayer(p);setModal(null);}} style={{cursor:"pointer",borderBottom:"0.5px solid #ddd"}}>
                    <td style={{...s.td,textAlign:"left",paddingLeft:10}}><span style={{fontSize:11,color:"#777",marginRight:5}}>{p.position}</span><span style={{fontWeight:500}}>{p.name}</span><CaptainBadge role={p.captainRole}/><span style={{fontSize:11,color:"#777",marginLeft:5}}>{"#"+p.number}</span></td>
                    {SKATER_COLS.map(c=><td key={c} style={{...s.td,fontWeight:c==="P"?600:400,color:c==="P"?tc:"#222"}}>{st[c]}</td>)}
                  </tr>
                );})}</tbody>
              </table>
            </div>
          </div>}
          {goalies.length>0&&<div>
            <div style={{fontWeight:500,fontSize:15,marginBottom:8,color:"#777"}}>Goalies</div>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",minWidth:380}}>
                <thead><tr style={{background:"#f5f5f5"}}>
                  <th style={{...s.th("",false),textAlign:"left",paddingLeft:10}}>Player</th>
                  {GOALIE_COLS.map(c=><th key={c} style={s.th(c,sortCol===c)} onClick={()=>{setSortCol(c);setSortDir(sortCol===c?-sortDir:-1);}}>{c}{sortCol===c?(sortDir<0?"↓":"↑"):""}</th>)}
                </tr></thead>
                <tbody>{sortGoalies(goalies).map(p=>{const st=getStats(p);return(
                  <tr key={p.id} onClick={()=>{setSelectedPlayer(p);setModal(null);}} style={{cursor:"pointer",borderBottom:"0.5px solid #ddd"}}>
                    <td style={{...s.td,textAlign:"left",paddingLeft:10}}><span style={{fontSize:11,color:"#777",marginRight:5}}>{p.position}</span><span style={{fontWeight:500}}>{p.name}</span><CaptainBadge role={p.captainRole}/><span style={{fontSize:11,color:"#777",marginLeft:5}}>{"#"+p.number}</span></td>
                    {GOALIE_COLS.map(c=><td key={c} style={{...s.td,fontWeight:c==="W"?600:400,color:c==="W"?tc:"#222"}}>{st[c]}</td>)}
                  </tr>
                );})}</tbody>
              </table>
            </div>
          </div>}
          {activePlayers.length===0&&<div style={{color:"#777",fontSize:14}}>No players on roster for this season.</div>}
        </div>
      )}

      {/* Gallery */}
      {!selectedPlayer&&page==="gallery"&&(
        <GalleryPage gallery={data.gallery} activeTeam={activeTeam} season={season} seasons={seasons} tc={tc} s={s} onAdd={addGalleryPhoto} onOpenLightbox={setLightbox}/>
      )}

      {/* Settings */}
      {!selectedPlayer&&page==="settings"&&(
        <SettingsPage data={data} teamLogos={teamLogos} teamSecondaryLogos={teamSecondaryLogos} teamFonts={teamFonts} teamOrder={teamOrder} onMoveTeam={moveTeam} onAddTeam={()=>requireAdmin(addTeam)} onAddSeason={addSeason} onDeleteSeason={deleteSeason} onSaveLogo={saveTeamLogo} onSaveSecondaryLogo={saveTeamSecondaryLogo} onSaveFont={saveTeamFont} onSaveName={saveTeamName} onSaveColor={saveTeamColor} onDeleteTeam={deleteTeam} onSavePassword={saveAdminPassword} s={s}/>
      )}

      {/* Player profile */}
      {selectedPlayer&&playerInView&&(()=>{
        const p=playerInView,st=getStats(p),isG=p.position==="G";
        const career=computeStats(p,games,data.statOverrides,"All Time",seasons);
        const seasonRows=seasons.filter(sv=>sv!=="All Time").reverse().map(sv=>({season:sv,stats:computeStats(p,games,data.statOverrides,sv,seasons)})).filter(r=>r.stats.GP>0);
        const playerGames=games.filter(g=>g.result&&(season==="All Time"?(isG?g.goalieStats?.[p.id]:g.skaterStats?.[p.id]):g.season===season&&(isG?g.goalieStats?.[p.id]:g.skaterStats?.[p.id])));
        const photo=data.playerPhotos?.[p.id];
        const sumG=["GP","W","L","GAA"],sumS=["GP","G","A","P"];
        const brkG=["GP","W","L","T","OTL","SO","GA","GAA"],brkS=["GP","G","A","P","PPG","PIM"];
        return (
          <div>
            <button onClick={()=>{setSelectedPlayer(null);setModal(null);}} style={{...s.sec,marginBottom:14,fontSize:13}}>Back</button>
            <div style={{background:tc,borderRadius:12,padding:20,color:"#fff",marginBottom:14}}>
              <div style={{display:"flex",alignItems:"center",gap:16}}>
                <PhotoAvatar photo={photo} number={p.number} size={64} pid={p.id} onSave={savePhoto}/>
                <div style={{flex:1}}><div style={{fontSize:20,fontWeight:600,display:"flex",alignItems:"center",flexWrap:"wrap",gap:4}}>{p.name}<CaptainBadge role={p.captainRole}/></div><div style={{fontSize:14,opacity:0.85}}>{p.position+" - #"+p.number+" - "+team.name}</div></div>
                <button onClick={()=>requireAdmin(()=>setModal({type:"editPlayer",player:{...p}}))} style={{background:"#fff",color:tc,border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:13,fontWeight:600}}>Edit</button>
              </div>
            </div>
            <div style={{...s.card,marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <span style={{fontWeight:500,fontSize:15}}>{season==="All Time"?"All Time":season} Stats</span>
                <button onClick={()=>requireAdmin(()=>setModal({type:"editStats",player:p,vals:{...st}}))} style={{...s.sec,fontSize:12,padding:"5px 10px"}}>Edit Stats</button>
              </div>
              <StatRow cols={isG?sumG:sumS} stats={st} highlight={isG?["W"]:["P"]}/>
            </div>
            <div style={{...s.card,marginBottom:14}}>
              <div style={{fontWeight:500,fontSize:15,marginBottom:10}}>Career Totals</div>
              <StatRow cols={isG?sumG:sumS} stats={career} highlight={isG?["W"]:["P"]}/>
            </div>
            {seasonRows.length>0&&(
              <div style={{...s.card,marginBottom:14,padding:0,overflow:"hidden"}}>
                <div style={{padding:"12px 16px 8px",fontWeight:500,fontSize:15}}>Season Breakdown</div>
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",minWidth:300}}>
                    <thead><tr style={{background:tc,color:"#fff"}}>
                      <th style={{textAlign:"left",padding:"7px 8px",fontSize:12,fontWeight:500,whiteSpace:"nowrap"}}>Season</th>
                      {(isG?brkG:brkS).map(c=><th key={c} style={{textAlign:"center",padding:"7px 5px",fontSize:12,fontWeight:500}}>{c}</th>)}
                    </tr></thead>
                    <tbody>
                      {seasonRows.map(({season:sv,stats})=>(
                        <tr key={sv} style={{borderBottom:"0.5px solid #ddd"}}>
                          <td style={{padding:"7px 8px",fontSize:12,color:"#777",whiteSpace:"nowrap"}}>{sv}</td>
                          {(isG?brkG:brkS).map(c=>{const val=c==="PPG"?(stats.GP>0?(stats.P/stats.GP).toFixed(2):"0.00"):stats[c];return <td key={c} style={{textAlign:"center",padding:"7px 5px",fontSize:13,fontWeight:(c==="P"||c==="W")?600:400,color:(c==="P"||c==="W")?tc:"#222"}}>{val}</td>;})}
                        </tr>
                      ))}
                      {(()=>{
                        const tot=(isG?brkG:brkS).reduce((acc,c)=>{if(c==="GAA")acc[c]=acc.GP>0?(acc.GA/acc.GP).toFixed(2):"0.00";else if(c==="PPG")acc[c]=acc.GP>0?(acc.P/acc.GP).toFixed(2):"0.00";else acc[c]=seasonRows.reduce((sum,r)=>sum+(parseFloat(r.stats[c])||0),0);return acc;},{});
                        return <tr style={{borderTop:"2px solid "+tc+"44",background:"#f5f5f5"}}>
                          <td style={{padding:"7px 8px",fontSize:12,fontWeight:600,color:tc,whiteSpace:"nowrap"}}>Total</td>
                          {(isG?brkG:brkS).map(c=><td key={c} style={{textAlign:"center",padding:"7px 5px",fontSize:13,fontWeight:600,color:(c==="P"||c==="W")?tc:"#222"}}>{tot[c]}</td>)}
                        </tr>;
                      })()}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
            <GameLog games={playerGames} isG={isG} player={p} tc={tc} s={s} allPlayers={players}/>
          </div>
        );
      })()}

      {/* Modals */}
      {modal&&(
        <div style={{marginTop:8,background:"#fff",borderRadius:14,border:"2px solid "+tc,padding:20}}>
          <div style={{display:"flex",justifyContent:"flex-end",marginBottom:8}}>
            <button onClick={()=>setModal(null)} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#777",lineHeight:1}}>×</button>
          </div>
          {modal.type==="adminLogin"&&<AdminLoginModal onSuccess={()=>{setIsAdmin(true);setModal(null);modal.onSuccess();}} onClose={()=>setModal(null)} s={s} tc={tc} adminPassword={data.adminPassword}/>}
          {(modal.type==="addPlayer"||modal.type==="editPlayer")&&<PlayerModal modal={modal} onSave={savePlayer} onDelete={deletePlayer} onClose={()=>setModal(null)} s={s} tc={tc} teamSeasons={seasons}/>}
          {modal.type==="addGame"&&<AddGameModal players={activePlayers} seasons={seasons.filter(sv=>sv!=="All Time")} defaultSeason={season!=="All Time"?season:seasons[1]||""} onSave={saveGame} onClose={()=>setModal(null)} s={s} tc={tc}/>}
          {modal.type==="enterResult"&&<EnterResultModal game={modal.game} players={activePlayers} onSave={enterResult} onClose={()=>setModal(null)} s={s} tc={tc}/>}
          {modal.type==="editStats"&&<EditStatsModal modal={modal} onSave={saveStatOverride} onClose={()=>setModal(null)} s={s} tc={tc}/>}
        </div>
      )}

      {/* Lightbox */}
      {lightbox&&<Lightbox photo={lightbox} isAdmin={isAdmin} onDelete={()=>requireAdmin(()=>deleteGalleryPhoto(lightbox.seasonKey,lightbox.id))} onClose={()=>setLightbox(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

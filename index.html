<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Hockey Stats" />
  <title>Hockey Stats</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #e8e8e8; min-height: 100vh; padding: 16px 12px 40px; }
    select, input, button { font-family: inherit; }
    input[type=number]::-webkit-inner-spin-button { opacity: 1; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useRef } = React;

    const ADMIN_PASSWORD = "admin";
    const GAME_TYPES = ["Regular Season","Playoff","Championship","Tournament"];
    const TEAMS_CONFIG = {
      team1: { name: "High Life Hockey (D5)", color: "#223E54", seasons: ["All Time","Winter 2025-2026","Summer 2025"] },
      team2: { name: "Yetis (D6)", color: "#622B3C", seasons: ["All Time","Winter 2025-2026","Summer 2025","Winter 2024-2025","Summer 2024","Winter 2023-2024","Summer 2023","Winter 2022-2023"] }
    };
    const initData = () => ({
      teams: { team1: { name: "High Life Hockey (D5)", color: "#223E54" }, team2: { name: "Yetis (D6)", color: "#622B3C" } },
      players: { team1: [], team2: [] }, games: { team1: [], team2: [] },
      statOverrides: {}, playerPhotos: {}, teamLogos: {}, teamFonts: {}
    });
    const SKATER_COLS = ["GP","G","A","P","PPG","PIM"];
    const GOALIE_COLS = ["GP","W","L","T","OTL","SO","GA","GAA"];
    const POSITIONS = ["C","LW","RW","D","G"];

    function computeStats(player, games, overrides, season) {
      const isGoalie = player.position === "G";
      if (season === "All Time") {
        const allSeasons = [...new Set([...TEAMS_CONFIG.team1.seasons, ...TEAMS_CONFIG.team2.seasons])].filter(s => s !== "All Time");
        if (isGoalie) {
          let t = { GP:0,W:0,L:0,T:0,OTL:0,SO:0,GA:0 };
          allSeasons.forEach(sv => { const st = computeStats(player,games,overrides,sv); if(st.GP>0){t.GP+=st.GP;t.W+=st.W;t.L+=st.L;t.T+=st.T;t.OTL+=st.OTL;t.SO+=st.SO;t.GA+=st.GA;} });
          t.GAA = t.GP>0?(t.GA/t.GP).toFixed(2):"0.00"; return t;
        } else {
          let t = { GP:0,G:0,A:0,PIM:0 };
          allSeasons.forEach(sv => { const st = computeStats(player,games,overrides,sv); if(st.GP>0){t.GP+=st.GP;t.G+=st.G;t.A+=st.A;t.PIM+=st.PIM;} });
          t.P=t.G+t.A; t.PPG=t.GP>0?(t.P/t.GP).toFixed(2):"0.00"; return t;
        }
      }
      const fg = games.filter(g=>g.season===season);
      const ov = overrides[player.id+"_"+season]||{};
      if (isGoalie) {
        let b={GP:0,W:0,L:0,T:0,OTL:0,SO:0,GA:0};
        fg.forEach(g=>{const s=g.goalieStats?.[player.id];if(s){b.GP++;b.W+=s.W||0;b.L+=s.L||0;b.T+=s.T||0;b.OTL+=s.OTL||0;b.SO+=s.SO||0;b.GA+=s.GA||0;}});
        if(Object.keys(ov).length>0)["GP","W","L","T","OTL","SO","GA"].forEach(k=>{if(ov[k]!==undefined)b[k]=ov[k];});
        b.GAA=b.GP>0?(b.GA/b.GP).toFixed(2):"0.00"; return b;
      } else {
        let b={GP:0,G:0,A:0,PIM:0};
        fg.forEach(g=>{const s=g.skaterStats?.[player.id];if(s){b.GP++;b.G+=s.G||0;b.A+=s.A||0;b.PIM+=s.PIM||0;}});
        if(Object.keys(ov).length>0)["GP","G","A","PIM"].forEach(k=>{if(ov[k]!==undefined)b[k]=ov[k];});
        b.P=b.G+b.A; b.PPG=b.GP>0?(b.P/b.GP).toFixed(2):"0.00"; return b;
      }
    }

    function getRecord(games, season) {
      const f = season==="All Time"?games:games.filter(g=>g.season===season);
      let W=0,L=0,T=0,OTL=0;
      f.forEach(g=>{const r=(g.result||"").toUpperCase();if(r==="W")W++;else if(r==="L")L++;else if(r==="T")T++;else if(r==="OTL")OTL++;});
      return {W,L,T,OTL,GP:f.length};
    }

    function App() {
      const [data, setData] = useState(() => {
        try {
          const s = localStorage.getItem("hockeyApp2");
          const d = s ? JSON.parse(s) : initData();
          d.teams.team1.name="High Life Hockey (D5)"; d.teams.team1.color="#223E54";
          d.teams.team2.name="Yetis (D6)"; d.teams.team2.color="#622B3C";
          if(!d.teamLogos)d.teamLogos={};if(!d.playerPhotos)d.playerPhotos={};if(!d.teamFonts)d.teamFonts={};
          localStorage.setItem("hockeyApp2",JSON.stringify(d)); return d;
        } catch { return initData(); }
      });
      const [activeTeam,setActiveTeam]=useState("team1");
      const [season,setSeason]=useState("Winter 2025-2026");
      const [page,setPage]=useState("roster");
      const [selectedPlayer,setSelectedPlayer]=useState(null);
      const [sortCol,setSortCol]=useState("P");
      const [sortDir,setSortDir]=useState(-1);
      const [modal,setModal]=useState(null);
      const [isAdmin,setIsAdmin]=useState(false);

      const save = d => { setData(d); try{localStorage.setItem("hockeyApp2",JSON.stringify(d));}catch{} };
      const teamCfg=TEAMS_CONFIG[activeTeam], team=data.teams[activeTeam];
      const players=data.players[activeTeam]||[], games=data.games[activeTeam]||[];
      const tc=team.color, seasons=teamCfg.seasons;
      const teamLogos=data.teamLogos||{}, teamFonts=data.teamFonts||{};
      const fontStyle=teamFonts[activeTeam]?("'TeamFont_"+activeTeam+"', sans-serif"):"inherit";
      const skaters=players.filter(p=>p.position!=="G"), goalies=players.filter(p=>p.position==="G");
      const getStats=p=>computeStats(p,games,data.statOverrides,season);
      const sortPlayers=arr=>[...arr].sort((a,b)=>(parseFloat(getStats(b)[sortCol])||0)-(parseFloat(getStats(a)[sortCol])||0));
      function requireAdmin(fn){if(isAdmin){fn();return;}setModal({type:"adminLogin",onSuccess:fn});}

      const s = {
        btn:{background:tc,color:"#fff",border:"none",borderRadius:8,padding:"8px 14px",cursor:"pointer",fontSize:14,fontWeight:500},
        sec:{background:"#f5f5f5",color:"#222",border:"0.5px solid #ccc",borderRadius:8,padding:"8px 14px",cursor:"pointer",fontSize:14},
        input:{width:"100%",padding:"8px 10px",border:"0.5px solid #ccc",borderRadius:8,background:"#fff",color:"#222",fontSize:14,boxSizing:"border-box"},
        th:(col,active)=>({padding:"8px 6px",textAlign:"center",fontSize:12,fontWeight:500,color:active?tc:"#777",cursor:"pointer",whiteSpace:"nowrap",userSelect:"none",borderBottom:active?"2px solid "+tc:"2px solid transparent"}),
        td:{padding:"8px 6px",textAlign:"center",fontSize:13,color:"#222"},
        card:{background:"#fff",border:"0.5px solid #ddd",borderRadius:10,padding:"12px 16px",marginBottom:10}
      };

      function savePlayer(p,isEdit){const d=JSON.parse(JSON.stringify(data));if(isEdit)d.players[activeTeam]=d.players[activeTeam].map(x=>x.id===p.id?p:x);else d.players[activeTeam].push({...p,id:"p"+Date.now()});save(d);setModal(null);}
      function deletePlayer(id){const d=JSON.parse(JSON.stringify(data));d.players[activeTeam]=d.players[activeTeam].filter(p=>p.id!==id);save(d);setModal(null);if(selectedPlayer?.id===id){setSelectedPlayer(null);setPage("roster");}}
      function saveGame(game){const d=JSON.parse(JSON.stringify(data));d.games[activeTeam].push({...game,id:"g"+Date.now()});save(d);setModal(null);}
      function deleteGame(gid){const d=JSON.parse(JSON.stringify(data));d.games[activeTeam]=d.games[activeTeam].filter(g=>g.id!==gid);save(d);}
      function saveStatOverride(player,vals){const d=JSON.parse(JSON.stringify(data));d.statOverrides[player.id+"_"+season]={...vals};save(d);setModal(null);}
      function savePhoto(pid,url){const d=JSON.parse(JSON.stringify(data));d.playerPhotos[pid]=url;save(d);}
      function saveTeamLogo(tid,url){const d=JSON.parse(JSON.stringify(data));if(!d.teamLogos)d.teamLogos={};d.teamLogos[tid]=url;save(d);}
      function saveTeamFont(tid,url){const d=JSON.parse(JSON.stringify(data));if(!d.teamFonts)d.teamFonts={};d.teamFonts[tid]=url;save(d);}
      function saveTeamName(tid,name){const d=JSON.parse(JSON.stringify(data));d.teams[tid].name=name;save(d);}

      const record=getRecord(games,season);
      const playerInView=selectedPlayer?players.find(p=>p.id===selectedPlayer.id)||selectedPlayer:null;
      const fontFaceCSS=Object.entries(teamFonts).filter(([,v])=>v).map(([tid,url])=>"@font-face{font-family:'TeamFont_"+tid+"';src:url('"+url+"');}").join(" ");

      const StatRow=({cols,stats,highlight})=>(
        <div style={{display:"flex",borderRadius:8,overflow:"hidden",border:"1px solid "+tc+"22"}}>
          {cols.map((c,i,arr)=>(
            <div key={c} style={{flex:1,textAlign:"center",padding:"10px 4px",background:i%2===0?"#f5f5f5":"#fff",borderRight:i<arr.length-1?"0.5px solid #ddd":"none"}}>
              <div style={{fontSize:11,color:"#777",marginBottom:4,fontWeight:500}}>{c}</div>
              <div style={{fontSize:20,fontWeight:600,color:highlight.includes(c)?tc:"#222"}}>{stats[c]}</div>
            </div>
          ))}
        </div>
      );

      return (
        <div style={{maxWidth:600,margin:"0 auto",fontFamily:fontStyle,background:"#f0f0f0",borderRadius:14,padding:"16px 14px 40px"}}>
          <style>{fontFaceCSS}</style>
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            {Object.entries(data.teams).map(([tid,t])=>{
              const active=activeTeam===tid, logo=teamLogos[tid];
              return <button key={tid} onClick={()=>{setActiveTeam(tid);setSelectedPlayer(null);setPage("roster");setSeason(TEAMS_CONFIG[tid].seasons[1]||TEAMS_CONFIG[tid].seasons[0]);setModal(null);}}
                style={{flex:1,padding:"8px 6px",borderRadius:10,border:"2px solid "+(active?t.color:"#ccc"),background:active?t.color:"#fff",color:active?"#fff":"#222",fontWeight:500,cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                {logo&&<img src={logo} alt="" style={{width:26,height:26,objectFit:"contain",borderRadius:4,flexShrink:0}}/>}
                <span>{t.name}</span>
              </button>;
            })}
          </div>
          <div style={{marginBottom:14}}>
            <select value={season} onChange={e=>setSeason(e.target.value)} style={s.input}>
              {seasons.map(sv=><option key={sv} value={sv}>{sv}</option>)}
            </select>
          </div>
          <div style={{background:tc,color:"#fff",padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",borderRadius:"10px 10px 0 0"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              {teamLogos[activeTeam]&&<img src={teamLogos[activeTeam]} alt="" style={{width:36,height:36,objectFit:"contain",flexShrink:0}}/>}
              <span style={{fontSize:17,fontWeight:500}}>{team.name}</span>
            </div>
            {record.GP>0&&season!=="All Time"&&<span style={{fontSize:13,background:"rgba(255,255,255,0.15)",borderRadius:20,padding:"3px 10px",fontWeight:500}}>{record.W+"-"+record.L+(record.T>0?"-"+record.T:"")+(record.OTL>0?" OTL:"+record.OTL:"")}</span>}
            <span style={{fontSize:12,opacity:0.85}}>{season}</span>
          </div>
          <div style={{display:"flex",borderBottom:"2px solid #ddd",marginBottom:16}}>
            {["roster","stats","games","settings"].map(p=>(
              <button key={p} onClick={()=>{if(p==="settings"){requireAdmin(()=>{setPage("settings");setSelectedPlayer(null);setModal(null);});return;}setPage(p);setSelectedPlayer(null);setModal(null);}}
                style={{flex:1,padding:"10px 2px",background:(page===p&&!selectedPlayer)?tc:"#fff",color:(page===p&&!selectedPlayer)?"#fff":"#777",border:"none",cursor:"pointer",fontWeight:(page===p&&!selectedPlayer)?500:400,fontSize:13,borderBottom:(page===p&&!selectedPlayer)?"2px solid "+tc:"2px solid #ddd"}}>
                {p.charAt(0).toUpperCase()+p.slice(1)}
              </button>
            ))}
            {selectedPlayer&&<button style={{flex:1,padding:"10px 4px",background:tc,color:"#fff",border:"none",cursor:"pointer",fontWeight:500,fontSize:13,borderBottom:"2px solid "+tc}}>Profile</button>}
          </div>

          {selectedPlayer&&playerInView&&(()=>{
            const p=playerInView, st=getStats(p), isG=p.position==="G";
            const career=computeStats(p,games,data.statOverrides,"All Time");
            const allSeasons=TEAMS_CONFIG[activeTeam].seasons.filter(sv=>sv!=="All Time").reverse();
            const seasonRows=allSeasons.map(sv=>({season:sv,stats:computeStats(p,games,data.statOverrides,sv)})).filter(r=>r.stats.GP>0);
            const playerGames=games.filter(g=>season==="All Time"?(isG?g.goalieStats?.[p.id]:g.skaterStats?.[p.id]):g.season===season&&(isG?g.goalieStats?.[p.id]:g.skaterStats?.[p.id]));
            const photo=data.playerPhotos?.[p.id];
            const sumG=["GP","W","L","GAA"],sumS=["GP","G","A","P"];
            const brkG=["GP","W","L","SO","GA","GAA"],brkS=["GP","G","A","P","PPG","PIM"];
            return <div>
              <button onClick={()=>{setSelectedPlayer(null);setModal(null);}} style={{...s.sec,marginBottom:14,fontSize:13}}>← Back</button>
              <div style={{background:tc,borderRadius:12,padding:20,color:"#fff",marginBottom:14}}>
                <div style={{display:"flex",alignItems:"center",gap:16}}>
                  <PhotoAvatar photo={photo} number={p.number} size={64} tc={tc} pid={p.id} onSave={savePhoto}/>
                  <div style={{flex:1}}><div style={{fontSize:20,fontWeight:600}}>{p.name}</div><div style={{fontSize:14,opacity:0.85}}>{p.position+" · #"+p.number+" · "+team.name}</div></div>
                  <button onClick={()=>requireAdmin(()=>setModal({type:"editPlayer",player:{...p}}))} style={{background:"#fff",color:tc,border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:13,fontWeight:600}}>Edit</button>
                </div>
              </div>
              <div style={{...s.card,marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <span style={{fontWeight:500,fontSize:15}}>{season==="All Time"?"All Time":season} Stats</span>
                  <button onClick={()=>requireAdmin(()=>setModal({type:"editStats",player:p,vals:{...st}}))} style={{...s.sec,fontSize:12,padding:"5px 10px"}}>Edit Stats</button>
                </div>
                <StatRow cols={isG?sumG:sumS} stats={st} highlight={isG?["W"]:["P"]}/>
              </div>
              <div style={{...s.card,marginBottom:14}}>
                <div style={{fontWeight:500,fontSize:15,marginBottom:10}}>Career Totals</div>
                <StatRow cols={isG?sumG:sumS} stats={career} highlight={isG?["W"]:["P"]}/>
              </div>
              {seasonRows.length>0&&<div style={{...s.card,marginBottom:14,padding:0,overflow:"hidden"}}>
                <div style={{padding:"12px 16px 8px",fontWeight:500,fontSize:15}}>Season Breakdown</div>
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",minWidth:300}}>
                    <thead><tr style={{background:tc,color:"#fff"}}>
                      <th style={{textAlign:"left",padding:"7px 8px",fontSize:12,fontWeight:500,whiteSpace:"nowrap"}}>Season</th>
                      {(isG?brkG:brkS).map(c=><th key={c} style={{textAlign:"center",padding:"7px 5px",fontSize:12,fontWeight:500}}>{c}</th>)}
                    </tr></thead>
                    <tbody>
                      {seasonRows.map(({season:sv,stats})=>(
                        <tr key={sv} style={{borderBottom:"0.5px solid #ddd"}}>
                          <td style={{padding:"7px 8px",fontSize:12,color:"#777",whiteSpace:"nowrap"}}>{sv}</td>
                          {(isG?brkG:brkS).map(c=>{const val=c==="PPG"?(stats.GP>0?(stats.P/stats.GP).toFixed(2):"0.00"):stats[c];return <td key={c} style={{textAlign:"center",padding:"7px 5px",fontSize:13,fontWeight:(c==="P"||c==="W")?600:400,color:(c==="P"||c==="W")?tc:"#222"}}>{val}</td>;})}
                        </tr>
                      ))}
                      {(()=>{
                        const tot=(isG?brkG:brkS).reduce((acc,c)=>{if(c==="GAA")acc[c]=acc.GP>0?(acc.GA/acc.GP).toFixed(2):"0.00";else if(c==="PPG")acc[c]=acc.GP>0?(acc.P/acc.GP).toFixed(2):"0.00";else acc[c]=seasonRows.reduce((sum,r)=>sum+(parseFloat(r.stats[c])||0),0);return acc;},{});
                        return <tr style={{borderTop:"2px solid "+tc+"44",background:"#f5f5f5"}}>
                          <td style={{padding:"7px 8px",fontSize:12,fontWeight:600,color:tc,whiteSpace:"nowrap"}}>Total</td>
                          {(isG?brkG:brkS).map(c=><td key={c} style={{textAlign:"center",padding:"7px 5px",fontSize:13,fontWeight:600,color:(c==="P"||c==="W")?tc:"#222"}}>{tot[c]}</td>)}
                        </tr>;
                      })()}
                    </tbody>
                  </table>
                </div>
              </div>}
              <GameLog games={playerGames} isG={isG} player={p} tc={tc} s={s}/>
            </div>;
          })()}

          {!selectedPlayer&&page==="settings"&&<SettingsPage data={data} teamLogos={teamLogos} teamFonts={teamFonts} onSaveLogo={saveTeamLogo} onSaveFont={saveTeamFont} onSaveName={saveTeamName} s={s}/>}

          {!selectedPlayer&&page==="roster"&&<div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <span style={{fontWeight:500,fontSize:15}}>Roster ({players.length})</span>
              <button style={s.btn} onClick={()=>requireAdmin(()=>setModal({type:"addPlayer"}))}>+ Add Player</button>
            </div>
            {players.length===0&&<div style={{color:"#777",fontSize:14}}>No players yet.</div>}
            {players.map(p=>{const photo=data.playerPhotos?.[p.id];return(
              <div key={p.id} style={{...s.card,cursor:"pointer"}} onClick={()=>{setSelectedPlayer(p);setModal(null);}}>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  {photo?<img src={photo} style={{width:42,height:42,borderRadius:"50%",objectFit:"cover",border:"2px solid "+tc}}/>:<div style={{width:42,height:42,borderRadius:"50%",background:tc+"22",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,color:tc,fontSize:14}}>{"#"+p.number}</div>}
                  <div><div style={{fontWeight:500,fontSize:15}}>{p.name}</div><div style={{fontSize:13,color:"#777"}}>{p.position+" · #"+p.number}</div></div>
                  <span style={{marginLeft:"auto",color:"#bbb",fontSize:18}}>›</span>
                </div>
              </div>
            );})}
          </div>}

          {!selectedPlayer&&page==="stats"&&<div>
            {skaters.length>0&&<div style={{marginBottom:24}}>
              <div style={{fontWeight:500,fontSize:15,marginBottom:8,color:"#777"}}>Skaters</div>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",minWidth:340}}>
                  <thead><tr style={{background:"#f5f5f5"}}>
                    <th style={{...s.th("",false),textAlign:"left",paddingLeft:10}}>Player</th>
                    {SKATER_COLS.map(c=><th key={c} style={s.th(c,sortCol===c)} onClick={()=>{setSortCol(c);setSortDir(sortCol===c?-sortDir:-1);}}>{c}{sortCol===c?(sortDir<0?"↓":"↑"):""}</th>)}
                  </tr></thead>
                  <tbody>{sortPlayers(skaters).map(p=>{const st=getStats(p);return(
                    <tr key={p.id} onClick={()=>{setSelectedPlayer(p);setModal(null);}} style={{cursor:"pointer",borderBottom:"0.5px solid #ddd"}}>
                      <td style={{...s.td,textAlign:"left",paddingLeft:10}}><span style={{fontWeight:500}}>{p.name}</span><span style={{fontSize:11,color:"#777",marginLeft:5}}>{"#"+p.number}</span></td>
                      {SKATER_COLS.map(c=><td key={c} style={{...s.td,fontWeight:c==="P"?600:400,color:c==="P"?tc:"#222"}}>{st[c]}</td>)}
                    </tr>
                  );})}</tbody>
                </table>
              </div>
            </div>}
            {goalies.length>0&&<div>
              <div style={{fontWeight:500,fontSize:15,marginBottom:8,color:"#777"}}>Goalies</div>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",minWidth:380}}>
                  <thead><tr style={{background:"#f5f5f5"}}>
                    <th style={{...s.th("",false),textAlign:"left",paddingLeft:10}}>Player</th>
                    {GOALIE_COLS.map(c=><th key={c} style={s.th(c,sortCol===c)} onClick={()=>{setSortCol(c);setSortDir(sortCol===c?-sortDir:-1);}}>{c}{sortCol===c?(sortDir<0?"↓":"↑"):""}</th>)}
                  </tr></thead>
                  <tbody>{sortPlayers(goalies).map(p=>{const st=getStats(p);return(
                    <tr key={p.id} onClick={()=>{setSelectedPlayer(p);setModal(null);}} style={{cursor:"pointer",borderBottom:"0.5px solid #ddd"}}>
                      <td style={{...s.td,textAlign:"left",paddingLeft:10}}><span style={{fontWeight:500}}>{p.name}</span><span style={{fontSize:11,color:"#777",marginLeft:5}}>{"#"+p.number}</span></td>
                      {GOALIE_COLS.map(c=><td key={c} style={{...s.td,fontWeight:c==="W"?600:400,color:c==="W"?tc:"#222"}}>{st[c]}</td>)}
                    </tr>
                  );})}</tbody>
                </table>
              </div>
            </div>}
            {players.length===0&&<div style={{color:"#777",fontSize:14}}>No players yet.</div>}
          </div>}

          {!selectedPlayer&&page==="games"&&<div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div>
                <span style={{fontWeight:500,fontSize:15}}>Games</span>
                {record.GP>0&&<span style={{marginLeft:10,fontSize:14,color:"#777"}}>Record: <span style={{fontWeight:500,color:tc}}>{record.W+"-"+record.L+(record.T>0?"-"+record.T:"")+(record.OTL>0?" ("+record.OTL+" OTL)":"")}</span></span>}
              </div>
              <button style={s.btn} onClick={()=>requireAdmin(()=>setModal({type:"addGame"}))}>+ Add Game</button>
            </div>
            {games.filter(g=>season==="All Time"||g.season===season).length===0&&<div style={{color:"#777",fontSize:14}}>No games yet.</div>}
            {[...games].filter(g=>season==="All Time"||g.season===season).reverse().map(g=>{
              const resColor=g.result==="W"?"#1a7a3c":g.result==="L"?"#c41a1a":g.result==="OTL"?"#b06000":"#777";
              const resBg=g.result==="W"?"#e8f5ee":g.result==="L"?"#fdecea":g.result==="OTL"?"#fff3e0":"#f5f5f5";
              return <div key={g.id} style={s.card}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div>
                    <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                      <span style={{fontWeight:500,fontSize:15}}>{"vs "+g.opponent}</span>
                      {g.result&&<span style={{fontSize:13,fontWeight:600,color:resColor,background:resBg,borderRadius:6,padding:"2px 8px"}}>{g.result}</span>}
                      {g.gameType&&g.gameType!=="Regular Season"&&<span style={{fontSize:12,color:tc,background:tc+"18",borderRadius:6,padding:"2px 8px",fontWeight:500}}>{g.gameType}</span>}
                    </div>
                    <div style={{fontSize:13,color:"#777",marginTop:2}}>{g.date+" · "+g.season}</div>
                    {g.score&&<div style={{fontSize:13,marginTop:2}}>{"Score: "+g.score}</div>}
                  </div>
                  <button onClick={()=>requireAdmin(()=>deleteGame(g.id))} style={{background:"none",border:"none",color:"#bbb",cursor:"pointer",fontSize:20,lineHeight:1,padding:"0 4px"}}>×</button>
                </div>
              </div>;
            })}
          </div>}

          {modal&&<div style={{marginTop:8,background:"#fff",borderRadius:14,border:"2px solid "+tc,padding:20}}>
            <div style={{display:"flex",justifyContent:"flex-end",marginBottom:8}}>
              <button onClick={()=>setModal(null)} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#777",lineHeight:1}}>×</button>
            </div>
            {modal.type==="adminLogin"&&<AdminLoginModal onSuccess={()=>{setIsAdmin(true);setModal(null);modal.onSuccess();}} onClose={()=>setModal(null)} s={s} tc={tc}/>}
            {(modal.type==="addPlayer"||modal.type==="editPlayer")&&<PlayerModal modal={modal} onSave={savePlayer} onDelete={deletePlayer} onClose={()=>setModal(null)} s={s} tc={tc}/>}
            {modal.type==="addGame"&&<GameModal modal={modal} players={players} seasons={seasons.filter(sv=>sv!=="All Time")} defaultSeason={season!=="All Time"?season:seasons[1]} onSave={saveGame} onClose={()=>setModal(null)} s={s} tc={tc}/>}
            {modal.type==="editStats"&&<EditStatsModal modal={modal} onSave={saveStatOverride} onClose={()=>setModal(null)} s={s} tc={tc}/>}
          </div>}
        </div>
      );
    }

    function AdminLoginModal({onSuccess,onClose,s,tc}){
      const [pw,setPw]=useState(""), [error,setError]=useState(false);
      function attempt(){if(pw===ADMIN_PASSWORD){onSuccess();}else{setError(true);setPw("");setTimeout(()=>setError(false),2000);}}
      return <div>
        <div style={{fontWeight:600,fontSize:17,marginBottom:4}}>Admin Access</div>
        <div style={{fontSize:13,color:"#777",marginBottom:16}}>Enter the admin password to continue.</div>
        <input type="password" style={{...s.input,marginBottom:8,borderColor:error?"#c41a1a":"#ccc"}} placeholder="Password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&attempt()}/>
        {error&&<div style={{fontSize:13,color:"#c41a1a",marginBottom:8}}>Incorrect password. Try again.</div>}
        <div style={{display:"flex",gap:8,marginTop:8}}>
          <button style={s.sec} onClick={onClose}>Cancel</button>
          <button style={{...s.btn,flex:1,background:tc}} onClick={attempt}>Unlock</button>
        </div>
      </div>;
    }

    function SettingsPage({data,teamLogos,teamFonts,onSaveLogo,onSaveFont,onSaveName,s}){
      return <div>
        <div style={{fontWeight:500,fontSize:15,marginBottom:14,color:"#777"}}>Team Settings</div>
        {Object.entries(data.teams).map(([tid,t])=><TeamSettingsCard key={tid} tid={tid} team={t} logo={teamLogos[tid]} font={teamFonts[tid]} onSaveLogo={onSaveLogo} onSaveFont={onSaveFont} onSaveName={onSaveName} s={s}/>)}
      </div>;
    }

    function TeamSettingsCard({tid,team,logo,font,onSaveLogo,onSaveFont,onSaveName,s}){
      const logoRef=useRef(), fontRef=useRef();
      const [name,setName]=useState(team.name), [saved,setSaved]=useState(false);
      function handleLogoFile(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>onSaveLogo(tid,ev.target.result);r.readAsDataURL(f);}
      function handleFontFile(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>onSaveFont(tid,ev.target.result);r.readAsDataURL(f);}
      function handleSaveName(){onSaveName(tid,name);setSaved(true);setTimeout(()=>setSaved(false),2000);}
      return <div style={{...s.card,marginBottom:16}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
          <div style={{width:10,height:40,borderRadius:4,background:team.color,flexShrink:0}}/>
          <span style={{fontWeight:600,fontSize:16}}>{team.name}</span>
        </div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:13,fontWeight:500,color:"#777",marginBottom:8}}>Team Logo</div>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:60,height:60,borderRadius:10,border:"2px dashed "+(logo?team.color:"#ccc"),background:"#f5f5f5",display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",flexShrink:0}}>
              {logo?<img src={logo} style={{width:"100%",height:"100%",objectFit:"contain",padding:4}}/>:<span style={{fontSize:24,color:"#bbb"}}>+</span>}
            </div>
            <div>
              <button onClick={()=>logoRef.current.click()} style={{...s.btn,background:team.color,fontSize:13,padding:"7px 14px"}}>{logo?"Change Logo":"Upload Logo"}</button>
              {logo&&<button onClick={()=>onSaveLogo(tid,null)} style={{...s.sec,fontSize:12,padding:"5px 10px",marginLeft:8,color:"#c41a1a",borderColor:"#c41a1a"}}>Remove</button>}
              <div style={{fontSize:11,color:"#aaa",marginTop:5}}>PNG, JPG or SVG</div>
            </div>
            <input ref={logoRef} type="file" accept="image/*,.svg" style={{display:"none"}} onChange={handleLogoFile}/>
          </div>
        </div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:13,fontWeight:500,color:"#777",marginBottom:8}}>Team Font</div>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:60,height:60,borderRadius:10,border:"2px dashed "+(font?team.color:"#ccc"),background:"#f5f5f5",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <span style={{fontFamily:font?("'TeamFont_"+tid+"', sans-serif"):"inherit",fontSize:22,fontWeight:700,color:font?team.color:"#bbb"}}>Aa</span>
            </div>
            <div>
              <button onClick={()=>fontRef.current.click()} style={{...s.btn,background:team.color,fontSize:13,padding:"7px 14px"}}>{font?"Change Font":"Upload Font"}</button>
              {font&&<button onClick={()=>onSaveFont(tid,null)} style={{...s.sec,fontSize:12,padding:"5px 10px",marginLeft:8,color:"#c41a1a",borderColor:"#c41a1a"}}>Remove</button>}
              <div style={{fontSize:11,color:"#aaa",marginTop:5}}>.ttf or .otf file</div>
            </div>
            <input ref={fontRef} type="file" accept=".ttf,.otf,.woff,.woff2" style={{display:"none"}} onChange={handleFontFile}/>
          </div>
        </div>
        <div>
          <div style={{fontSize:13,fontWeight:500,color:"#777",marginBottom:8}}>Team Name</div>
          <div style={{display:"flex",gap:8}}>
            <input style={{...s.input,flex:1}} value={name} onChange={e=>setName(e.target.value)}/>
            <button onClick={handleSaveName} style={{...s.btn,background:team.color,whiteSpace:"nowrap"}}>{saved?"Saved ✓":"Save"}</button>
          </div>
        </div>
      </div>;
    }

    function PhotoAvatar({photo,number,size,tc,pid,onSave}){
      const ref=useRef();
      function handleFile(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>onSave(pid,ev.target.result);r.readAsDataURL(f);}
      return <div style={{position:"relative",width:size,height:size,flexShrink:0,cursor:"pointer"}} onClick={()=>ref.current.click()}>
        {photo?<img src={photo} style={{width:size,height:size,borderRadius:"50%",objectFit:"cover",border:"2px solid rgba(255,255,255,0.4)"}}/>
          :<div style={{width:size,height:size,borderRadius:"50%",background:"rgba(255,255,255,0.2)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:size*0.3,color:"#fff"}}>{"#"+number}</div>}
        <div style={{position:"absolute",bottom:0,right:0,width:20,height:20,borderRadius:"50%",background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        </div>
        <input ref={ref} type="file" accept="image/*" style={{display:"none"}} onChange={handleFile}/>
      </div>;
    }

    function GameLog({games,isG,player,tc,s}){
      const [expanded,setExpanded]=useState(false);
      const allReversed=[...games].reverse();
      const displayed=expanded?allReversed:allReversed.slice(0,5);
      return <div style={{...s.card,marginBottom:14,padding:0,overflow:"hidden"}}>
        <div style={{background:tc,padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontWeight:500,fontSize:15,color:"#fff"}}>Game Log</span>
          <span style={{fontSize:13,color:"rgba(255,255,255,0.8)"}}>{games.length+" game"+(games.length!==1?"s":"")}</span>
        </div>
        {games.length===0?<div style={{padding:"14px 16px",color:"#777",fontSize:14}}>No games recorded yet.</div>:<>
          {displayed.map(g=>{
            const gs=isG?g.goalieStats?.[player.id]:g.skaterStats?.[player.id];
            if(!gs)return null;
            const resColor=g.result==="W"?"#1a7a3c":g.result==="L"?"#c41a1a":"#777";
            return <div key={g.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 16px",borderBottom:"0.5px solid #ddd",fontSize:14}}>
              <div>
                <span style={{color:"#777",fontSize:12}}>{g.date}</span>
                <span style={{marginLeft:8,fontWeight:500}}>{"vs "+g.opponent}</span>
                {g.result&&<span style={{marginLeft:8,fontWeight:600,color:resColor}}>{g.result+(g.score?" "+g.score:"")}</span>}
                {g.gameType&&g.gameType!=="Regular Season"&&<span style={{marginLeft:6,fontSize:11,color:tc}}>{g.gameType}</span>}
              </div>
              <span style={{color:"#777",fontSize:13}}>{isG?("W:"+(gs.W||0)+" L:"+(gs.L||0)+" GA:"+(gs.GA||0)):("G:"+(gs.G||0)+" A:"+(gs.A||0)+" P:"+((gs.G||0)+(gs.A||0)))}</span>
            </div>;
          })}
          {games.length>5&&<button onClick={()=>setExpanded(e=>!e)} style={{width:"100%",padding:"10px",background:"#f5f5f5",border:"none",borderTop:"0.5px solid #ddd",cursor:"pointer",fontSize:13,color:tc,fontWeight:500}}>
            {expanded?"Show less ↑":("Show all "+games.length+" games ↓")}
          </button>}
        </>}
      </div>;
    }

    function PlayerModal({modal,onSave,onDelete,onClose,s,tc}){
      const isEdit=modal.type==="editPlayer";
      const [form,setForm]=useState(isEdit?modal.player:{name:"",number:"",position:"C"});
      const [confirmDelete,setConfirmDelete]=useState(false);
      const set=(k,v)=>setForm(f=>({...f,[k]:v}));
      return <div>
        <div style={{fontWeight:500,fontSize:17,marginBottom:16}}>{isEdit?"Edit Player":"Add Player"}</div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <input style={s.input} placeholder="Full name" value={form.name} onChange={e=>set("name",e.target.value)}/>
          <input style={s.input} placeholder="Jersey number" value={form.number} onChange={e=>set("number",e.target.value)}/>
          <select style={s.input} value={form.position} onChange={e=>set("position",e.target.value)}>
            {POSITIONS.map(p=><option key={p} value={p}>{p}</option>)}
          </select>
        </div>
        {confirmDelete&&<div style={{marginTop:14,background:"#fdecea",border:"1px solid #c41a1a",borderRadius:8,padding:"12px 14px"}}>
          <div style={{fontWeight:500,fontSize:14,color:"#c41a1a",marginBottom:10}}>{"Delete "+form.name+"? This cannot be undone."}</div>
          <div style={{display:"flex",gap:8}}>
            <button style={{...s.sec,flex:1}} onClick={()=>setConfirmDelete(false)}>Cancel</button>
            <button style={{flex:1,background:"#c41a1a",color:"#fff",border:"none",borderRadius:8,padding:"8px 14px",cursor:"pointer",fontSize:14,fontWeight:500}} onClick={()=>onDelete(form.id)}>Yes, Delete</button>
          </div>
        </div>}
        {!confirmDelete&&<div style={{display:"flex",gap:8,marginTop:16}}>
          <button style={s.sec} onClick={onClose}>Cancel</button>
          {isEdit&&<button style={{...s.sec,color:"#c41a1a",borderColor:"#c41a1a"}} onClick={()=>setConfirmDelete(true)}>Delete</button>}
          <button style={{...s.btn,flex:1}} onClick={()=>form.name&&onSave(form,isEdit)}>Save</button>
        </div>}
      </div>;
    }

    function GameModal({modal,players,seasons,defaultSeason,onSave,onClose,s,tc}){
      const [date,setDate]=useState(new Date().toISOString().slice(0,10));
      const [opponent,setOpponent]=useState("");
      const [score,setScore]=useState("");
      const [result,setResult]=useState("W");
      const [gameSeason,setGameSeason]=useState(defaultSeason||seasons[0]);
      const [gameType,setGameType]=useState("Regular Season");
      const [skaterStats,setSkaterStats]=useState({});
      const [goalieStats,setGoalieStats]=useState({});
      const skaters=players.filter(p=>p.position!=="G");
      const goalies=players.filter(p=>p.position==="G");
      const setSS=(pid,k,v)=>setSkaterStats(prev=>({...prev,[pid]:{...prev[pid],[k]:parseInt(v)||0}}));
      const setGS=(pid,k,v)=>setGoalieStats(prev=>({...prev,[pid]:{...prev[pid],[k]:parseInt(v)||0}}));
      const si={...s.input,padding:"5px 6px",fontSize:13,textAlign:"center"};
      return <div>
        <div style={{fontWeight:500,fontSize:17,marginBottom:16}}>Add Game</div>
        <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:16}}>
          <select style={s.input} value={gameSeason} onChange={e=>setGameSeason(e.target.value)}>{seasons.map(sv=><option key={sv} value={sv}>{sv}</option>)}</select>
          <select style={s.input} value={gameType} onChange={e=>setGameType(e.target.value)}>{GAME_TYPES.map(t=><option key={t} value={t}>{t}</option>)}</select>
          <input type="date" style={s.input} value={date} onChange={e=>setDate(e.target.value)}/>
          <input style={s.input} placeholder="Opponent team name" value={opponent} onChange={e=>setOpponent(e.target.value)}/>
          <div style={{display:"flex",gap:8}}>
            <input style={{...s.input,flex:1}} placeholder="Score (e.g. 5-3)" value={score} onChange={e=>setScore(e.target.value)}/>
            <select style={{...s.input,width:"auto"}} value={result} onChange={e=>setResult(e.target.value)}>{["W","L","T","OTL"].map(r=><option key={r} value={r}>{r}</option>)}</select>
          </div>
        </div>
        {skaters.length>0&&<div style={{marginBottom:14}}>
          <div style={{fontWeight:500,fontSize:14,marginBottom:8,color:"#777"}}>Skater Stats</div>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",minWidth:260}}>
              <thead><tr style={{background:"#f5f5f5"}}><th style={{padding:"6px 8px",textAlign:"left",fontSize:13}}>Player</th>{["G","A","PIM"].map(c=><th key={c} style={{padding:"6px",fontSize:13,textAlign:"center"}}>{c}</th>)}</tr></thead>
              <tbody>{skaters.map(p=><tr key={p.id} style={{borderBottom:"0.5px solid #ddd"}}>
                <td style={{padding:"6px 8px",fontSize:13}}>{p.name}</td>
                {["G","A","PIM"].map(c=><td key={c} style={{padding:4}}><input type="number" min="0" style={si} value={skaterStats[p.id]?.[c]??""} placeholder="0" onChange={e=>setSS(p.id,c,e.target.value)}/></td>)}
              </tr>)}</tbody>
            </table>
          </div>
        </div>}
        {goalies.length>0&&<div style={{marginBottom:14}}>
          <div style={{fontWeight:500,fontSize:14,marginBottom:8,color:"#777"}}>Goalie Stats</div>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",minWidth:320}}>
              <thead><tr style={{background:"#f5f5f5"}}><th style={{padding:"6px 8px",textAlign:"left",fontSize:13}}>Player</th>{["W","L","T","OTL","SO","GA"].map(c=><th key={c} style={{padding:"6px 4px",fontSize:13,textAlign:"center"}}>{c}</th>)}</tr></thead>
              <tbody>{goalies.map(p=><tr key={p.id} style={{borderBottom:"0.5px solid #ddd"}}>
                <td style={{padding:"6px 8px",fontSize:13}}>{p.name}</td>
                {["W","L","T","OTL","SO","GA"].map(c=><td key={c} style={{padding:4}}><input type="number" min="0" style={si} value={goalieStats[p.id]?.[c]??""} placeholder="0" onChange={e=>setGS(p.id,c,e.target.value)}/></td>)}
              </tr>)}</tbody>
            </table>
          </div>
        </div>}
        <div style={{display:"flex",gap:8,marginTop:8}}>
          <button style={s.sec} onClick={onClose}>Cancel</button>
          <button style={{...s.btn,flex:1}} onClick={()=>opponent&&onSave({date,opponent,score,result,season:gameSeason,gameType,skaterStats,goalieStats})}>Save Game</button>
        </div>
      </div>;
    }

    function EditStatsModal({modal,onSave,onClose,s,tc}){
      const {player}=modal, isG=player.position==="G";
      const cols=isG?GOALIE_COLS.filter(c=>c!=="GAA"):SKATER_COLS.filter(c=>c!=="P"&&c!=="PPG");
      const [vals,setVals]=useState({...modal.vals});
      const set=(k,v)=>setVals(prev=>({...prev,[k]:parseInt(v)||0}));
      return <div>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
          <div style={{width:36,height:36,borderRadius:"50%",background:tc,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:13}}>{"#"+player.number}</div>
          <div><div style={{fontWeight:600,fontSize:16}}>{player.name}</div><div style={{fontSize:12,color:"#777"}}>Edit Stats Override</div></div>
        </div>
        <div style={{fontSize:12,color:"#777",background:"#f5f5f5",borderRadius:8,padding:"8px 12px",marginBottom:16,borderLeft:"3px solid "+tc}}>These values override game-log totals for the selected season.</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
          {cols.map(c=><div key={c} style={{background:"#f5f5f5",borderRadius:10,padding:"10px 10px 8px",border:"0.5px solid #ddd"}}>
            <div style={{fontSize:11,fontWeight:600,color:tc,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.05em"}}>{c}</div>
            <input type="number" min="0" style={{width:"100%",padding:"6px 8px",border:"1.5px solid "+tc+"55",borderRadius:7,background:"#fff",color:"#222",fontSize:18,fontWeight:600,textAlign:"center",boxSizing:"border-box"}} value={vals[c]??""} placeholder="0" onChange={e=>set(c,e.target.value)}/>
          </div>)}
        </div>
        <div style={{display:"flex",gap:8,marginTop:16}}>
          <button style={s.sec} onClick={onClose}>Cancel</button>
          <button style={{...s.btn,flex:1}} onClick={()=>onSave(player,vals)}>Save Stats</button>
        </div>
      </div>;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
